[build-system]
requires = ["hatchling >= 1.30"]
build-backend = "hatchling.build"

[project]
name = "hello"
version = "1.0.0"
authors = [{ name = "$OWNER" }]
description = ""
readme = { file = "README.md", content-type = "text/markdown" }
requires-python = ">=3.13"
license = { file = "LICENSE" }
classifiers = [
    "Programming Language :: Python :: 3",
    "Operating System :: OS Independent",
]
dependencies = [
    "requests~=2.34",
]

[project.urls]
Homepage = "https://github.com/$OWNER/hello-python"
Issues = "https://github.com/$OWNER/hello-python/issues"

[tool.hatch.build]
exclude = ["tests/**", "*.pyc", ".github/**", '/example.py']
